name: Push to AWS CodeCommit

on:
  push:

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config --global credential.helper store
          echo "https://${AWS_USERNAME}:${AWS_PASSWORD}@git-codecommit.ap-southeast-2.amazonaws.com" > ~/.git-credentials
        env:
          AWS_USERNAME: ${{ secrets.AWS_USERNAME }}
          AWS_PASSWORD: ${{ secrets.AWS_PASSWORD }}

      - name: Add AWS Remote & Push
        run: |
          git remote add aws https://git-codecommit.ap-southeast-2.amazonaws.com/v1/repos/yantra-app
          git push aws HEAD:${GITHUB_REF_NAME}
